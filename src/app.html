<!doctype html>
<html lang="en" data-theme="%theme.initial%" data-theme-mode="%theme.mode%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="csrf-token" content="%csrf.token%" />
		<title>Copilot Portal</title>
		<script>
			// Pre-hydration: resolve initial sidebar state so the first paint matches
			// the user's persisted choice (or viewport default) without a flash.
			(function () {
				try {
					var v = localStorage.getItem('sidebarOpen');
					var open =
						v === 'true'
							? true
							: v === 'false'
								? false
								: window.matchMedia('(min-width: 769px)').matches;
					document.documentElement.dataset.sidebar = open ? 'open' : 'closed';
				} catch (e) {
					document.documentElement.dataset.sidebar = 'open';
				}
			})();
			// Pre-hydration: when the user's theme preference is "system", resolve
			// data-theme from prefers-color-scheme before first paint, and keep it
			// in sync if the OS theme changes while the tab is open. For explicit
			// "dark"/"light" the server already rendered the correct value.
			(function () {
				try {
					var root = document.documentElement;
					if (root.dataset.themeMode !== 'system') return;
					var mq = window.matchMedia('(prefers-color-scheme: light)');
					function apply() {
						if (root.dataset.themeMode === 'system') {
							root.dataset.theme = mq.matches ? 'light' : 'dark';
						}
					}
					apply();
					if (mq.addEventListener) mq.addEventListener('change', apply);
					else if (mq.addListener) mq.addListener(apply);
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
