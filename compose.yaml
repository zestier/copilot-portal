services:
  portal:
    build: .
    image: copilot-portal:latest
    restart: unless-stopped
    environment:
      HOST: 127.0.0.1
      PORT: 3000
      DATA_DIR: /data
      AUTH_MODE: ${AUTH_MODE:-github}
      SESSION_SECRET: ${SESSION_SECRET:?required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?required}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      ALLOWED_GITHUB_LOGINS: ${ALLOWED_GITHUB_LOGINS:-}
      SHARED_SECRET: ${SHARED_SECRET:-}
      COPILOT_GITHUB_TOKEN: ${COPILOT_GITHUB_TOKEN:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-claude-sonnet-4.5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      IDLE_TIMEOUT_MIN: ${IDLE_TIMEOUT_MIN:-15}
      MAX_CONCURRENT_SESSIONS: ${MAX_CONCURRENT_SESSIONS:-4}
    volumes:
      - ./data:/data
    network_mode: host

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?required}
    network_mode: host
    depends_on:
      - portal
