name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Prevent two release runs from racing for `:latest`.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Until upstream JS actions ship Node 24 majors, opt in explicitly so
# the deprecation warning ("Node.js 20 actions are deprecated") is
# resolved without waiting for new releases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions: {}

jobs:
  image:
    runs-on: ubuntu-latest
    # workflow_dispatch is restricted to the default branch so that
    # manual runs from feature branches can't publish images.
    if: github.event_name == 'push' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: read
      packages: write
      # Required for SLSA build provenance attestations.
      id-token: write
      attestations: write
    steps:
      # All actions are SHA-pinned. Update via `pnpm run release:bump-actions`;
      # tag comments show the intended major version.

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          # Only used for the `deps` stage on the non-native target arch.
          # The `build` stage runs natively via --platform=$BUILDPLATFORM.
          platforms: arm64

      - name: Set up buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope cache to the release ref so unrelated workflows (CI,
          # PR builds) cannot poison the cache used here.
          cache-from: type=gha,scope=release-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=release-${{ github.ref_name }}
          provenance: mode=max
          sbom: true

      # Cryptographically attest the published image so consumers can verify
      # it with `gh attestation verify`.
      - name: Attest provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
