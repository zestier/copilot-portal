name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Prevent two release runs from racing for `:latest`.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  image:
    runs-on: ubuntu-latest
    # workflow_dispatch is restricted to the default branch so that
    # manual runs from feature branches can't publish images.
    if: github.event_name == 'push' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: read
      packages: write
      # Required for SLSA build provenance attestations.
      id-token: write
      attestations: write
    steps:
      # All actions are SHA-pinned. Update via `pnpm run release:bump-actions`;
      # tag comments show the intended major version.

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          # Only used for the `deps` stage on the non-native target arch.
          # The `build` stage runs natively via --platform=$BUILDPLATFORM.
          platforms: arm64

      - name: Set up buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope cache to the release ref so unrelated workflows (CI,
          # PR builds) cannot poison the cache used here.
          cache-from: type=gha,scope=release-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=release-${{ github.ref_name }}
          provenance: mode=max
          sbom: true

      # Cryptographically attest the published image so consumers can verify
      # it with `gh attestation verify`.
      - name: Attest provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
