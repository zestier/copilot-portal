name: ci
on:
  push:
    branches: ['**']
  pull_request:

# Default to no permissions; each job re-grants only `contents: read`.
# This means even if a step is compromised, GITHUB_TOKEN cannot push code,
# open issues, comment on PRs, or publish packages.
permissions: {}

# Cancel superseded runs on the same ref so a fork can't tie up the queue
# by force-pushing in a tight loop.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Fan-out structure:
#
#   install -> lint
#           -> check
#           -> test
#           -> e2e
#   docker (independent, starts immediately)
#
# `install` populates a `node_modules` cache (keyed on the lockfile) plus
# the pnpm store cache that actions/setup-node manages. Downstream jobs
# restore both, so each one only pays the actual task cost (plus a few
# seconds of cache restore) instead of re-installing from scratch.
#
# The Docker job has no `needs:` so it starts at t=0 and runs in parallel
# with everything else. It rebuilds from source inside Docker (it does
# not consume the install cache) but that work is mostly base-image
# pulls + a buildx GHA cache hit on incremental changes. The job is a
# matrix that builds each platform on a native runner (no QEMU).

jobs:
  install:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      cache-key: ${{ steps.key.outputs.value }}
    steps:
      # All actions are SHA-pinned. Update via `pnpm run release:bump-actions`;
      # tag comments show the intended major version.

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      # Cache key shared with every downstream job. Tied to the lockfile so
      # any dependency change invalidates it.
      - name: Compute cache key
        id: key
        run: |
          echo "value=node_modules-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"

      - name: Cache node_modules
        id: nm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: ${{ steps.key.outputs.value }}

      - name: Install
        if: steps.nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

  lint:
    needs: install
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Restore node_modules
        id: nm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}

      # Fallback if the cache was evicted between install and this job.
      - name: Install (fallback)
        if: steps.nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - run: pnpm run lint

  check:
    needs: install
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Restore node_modules
        id: nm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}

      - name: Install (fallback)
        if: steps.nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - run: pnpm run check

  test:
    needs: install
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Restore node_modules
        id: nm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}

      - name: Install (fallback)
        if: steps.nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - run: pnpm test

  e2e:
    needs: install
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Restore node_modules
        id: nm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}

      - name: Install (fallback)
        if: steps.nm.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright e2e
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          # When e2e fails before any output is written (e.g. the build
          # step inside `test:e2e` failed), neither directory exists.
          # Don't warn the run as a result.
          if-no-files-found: ignore

  # Exercise the same multi-arch Docker build that release.yml publishes,
  # but without pushing. This catches arch-specific Dockerfile/base-image
  # regressions in PRs instead of only at release time.
  #
  # Each platform builds on its native GitHub-hosted runner (amd64 on
  # ubuntu-latest, arm64 on ubuntu-24.04-arm) so we don't pay the QEMU
  # emulation tax for arm64. No QEMU is involved.
  #
  # Independent of the JS test matrix above: starts immediately on push.
  docker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image (${{ matrix.arch }}, no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          # Scope cache per-branch and per-arch so PR builds can't poison
          # the release cache (which is keyed by release ref) and the two
          # arch legs don't trample each other's cache.
          cache-from: type=gha,scope=ci-${{ github.ref_name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ci-${{ github.ref_name }}-${{ matrix.arch }}
