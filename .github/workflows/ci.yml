name: ci
on:
  push:
    branches: ['**']
  pull_request:

# Default to no permissions; the single job re-grants only `contents: read`.
# This means even if a step is compromised, GITHUB_TOKEN cannot push code,
# open issues, comment on PRs, or publish packages.
permissions: {}

# Cancel superseded runs on the same ref so a fork can't tie up the queue
# by force-pushing in a tight loop.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # All actions are SHA-pinned. Update via `pnpm run release:bump-actions`;
      # tag comments show the intended major version.

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Don't leave GITHUB_TOKEN configured as a git credential for
          # subsequent steps — none of them need to push.
          persist-credentials: false

      - name: Set up pnpm
        # No `version:` here — pnpm/action-setup reads `packageManager`
        # from package.json. Pinning it in two places trips
        # ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run check
      - run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright e2e
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          # When e2e fails before any output is written (e.g. the build
          # step inside `test:e2e` failed), neither directory exists.
          # Don't warn the run as a result.
          if-no-files-found: ignore

      # Exercise the same multi-arch Docker build that release.yml
      # publishes, but without pushing. This catches arm64-only
      # Dockerfile/base-image regressions in PRs instead of only at
      # release time.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: arm64

      - name: Set up buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image (multi-arch, no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          # Scope cache to this branch so PR builds can't poison the
          # release cache (which is keyed by release ref).
          cache-from: type=gha,scope=ci-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=ci-${{ github.ref_name }}
