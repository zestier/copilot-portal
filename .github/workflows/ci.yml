name: ci
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm run check
      - run: npm test
      - name: Build Docker image
        run: docker build -t copilot-portal:ci .
