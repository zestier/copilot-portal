name: ci
on:
  push:
    branches: ['**']
  pull_request:

# Until upstream JS actions ship Node 24 majors, opt in explicitly so
# the deprecation warning ("Node.js 20 actions are deprecated") is
# resolved without waiting for new releases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Default to no permissions; the single job re-grants only `contents: read`.
# This means even if a step is compromised, GITHUB_TOKEN cannot push code,
# open issues, comment on PRs, or publish packages.
permissions: {}

# Cancel superseded runs on the same ref so a fork can't tie up the queue
# by force-pushing in a tight loop.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # All actions are SHA-pinned. Update via `pnpm run release:bump-actions`;
      # tag comments show the intended major version.

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Don't leave GITHUB_TOKEN configured as a git credential for
          # subsequent steps — none of them need to push.
          persist-credentials: false

      - name: Set up pnpm
        # No `version:` here — pnpm/action-setup reads `packageManager`
        # from package.json. Pinning it in two places trips
        # ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run check
      - run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright e2e
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          # When e2e fails before any output is written (e.g. the build
          # step inside `test:e2e` failed), neither directory exists.
          # Don't warn the run as a result.
          if-no-files-found: ignore

      # Exercise the same multi-arch Docker build that release.yml
      # publishes, but without pushing. This catches arm64-only
      # Dockerfile/base-image regressions in PRs instead of only at
      # release time.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: arm64

      - name: Set up buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image (multi-arch, no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          # Scope cache to this branch so PR builds can't poison the
          # release cache (which is keyed by release ref).
          cache-from: type=gha,scope=ci-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=ci-${{ github.ref_name }}
